name: MixPilotRemote
options:
  bundleIdPrefix: com.lucasmezen.mixpilot
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  MixPilotRemote:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucasmezen.mixpilot.remote
        PRODUCT_NAME: MixPilot Remote
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
schemes:
  MixPilotRemote:
    build:
      targets:
        MixPilotRemote: all
    run:
      config: Debug
    archive:
      config: Release
