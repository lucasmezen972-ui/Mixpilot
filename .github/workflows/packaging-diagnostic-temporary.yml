name: MixPilot Packaging Diagnostic (Temporary)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  package-diagnostic:
    if: >-
      github.event.issue.number == 53 &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/packaging-diagnostic'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Resolve audited PR head
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            if (pr.head.ref !== 'consolidation/security-cloud-trust') {
              core.setFailed(`Unexpected head branch: ${pr.head.ref}`);
              return;
            }
            core.setOutput('sha', pr.head.sha);
      - name: Checkout audited PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          persist-credentials: false
      - name: Run packaging diagnostic
        shell: bash
        env:
          MIXPILOT_VERSION: 0.4.0-dev
          CODE_SIGN_IDENTITY: '-'
          MIXPILOT_SKIP_TESTS: '1'
        run: |
          set -u
          chmod +x Scripts/*.sh
          set +e
          set -o pipefail
          ./Scripts/build_release.sh 2>&1 | tee build-release.log
          build_status=${PIPESTATUS[0]}
          package_status=99
          if [[ "$build_status" -eq 0 ]]; then
            ./Scripts/package_dmg.sh 2>&1 | tee package-dmg.log
            package_status=${PIPESTATUS[0]}
          else
            echo "Packaging skipped because build_release.sh failed." | tee package-dmg.log
          fi
          printf 'build_status=%s\npackage_status=%s\n' "$build_status" "$package_status" | tee packaging-status.txt
          exit 0
      - name: Upload diagnostic logs and package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-packaging-diagnostic
          path: |
            build-release.log
            package-dmg.log
            packaging-status.txt
            ultimate-audit
            architecture-counter-audit
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
          if-no-files-found: warn
      - name: Publish diagnostic result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (path) => {
              try { return fs.readFileSync(path, 'utf8'); }
              catch { return '(missing)'; }
            };
            const tail = (text, count = 60) => text.split('\n').slice(-count).join('\n');
            const body = [
              '## Diagnostic packaging',
              '',
              `SHA audité : \`${{ steps.pr.outputs.sha }}\``,
              '',
              '### Statut',
              '```text',
              read('packaging-status.txt'),
              '```',
              '',
              '### build_release.sh — fin du journal',
              '```text',
              tail(read('build-release.log')),
              '```',
              '',
              '### package_dmg.sh — fin du journal',
              '```text',
              tail(read('package-dmg.log')),
              '```'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Enforce diagnostic result
        shell: bash
        run: |
          set -euo pipefail
          source packaging-status.txt
          [[ "$build_status" -eq 0 ]]
          [[ "$package_status" -eq 0 ]]
