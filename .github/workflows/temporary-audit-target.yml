name: Temporary MixPilot Audit Target

on:
  pull_request_target:
    types: [reopened]
    branches:
      - consolidation/security-cloud-trust

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: mixpilot-temporary-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit/ultimate-hardening-final'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Restore and verify Rekordbox Hub preview contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Sources/MixPilotApp/RekordboxHubView.swift")
          source = path.read_text(encoding="utf-8")

          if "private actor RekordboxHubFileStore" not in source:
              raise SystemExit("RekordboxHubFileStore is missing.")

          if "var preparationPreview: SetProject?" not in source:
              marker = "\n}\n\nprivate enum RekordboxHubSection"
              if source.count(marker) != 1:
                  raise SystemExit("Expected RekordboxHubModel closing marker was not found exactly once.")
              property_block = '''
              var preparationPreview: SetProject? {
                  guard let result = importResult, !result.tracks.isEmpty else { return nil }
                  return SetPreparationEngine().prepare(
                      name: sourceFilename ?? "Bibliothèque rekordbox",
                      tracks: result.mixPilotTracks
                  )
              }
          '''
              source = source.replace(
                  marker,
                  "\n\n" + property_block + "}\n\nprivate enum RekordboxHubSection",
                  1,
              )

          checks = {
              "file actor": source.count("private actor RekordboxHubFileStore") == 1,
              "preview contract": source.count("var preparationPreview: SetProject?") == 1,
              "preparation engine": source.count("SetPreparationEngine().prepare(") == 1,
              "async model operations": source.count("Task { @MainActor [weak self, fileStore] in") == 2,
              "isolated disk reads": source.index("Data(contentsOf:") < source.index("@MainActor"),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit("Hub integrity checks failed: " + ", ".join(failed))

          path.write_text(source, encoding="utf-8")
          PY

          git diff --check
          if ! git diff --quiet -- Sources/MixPilotApp/RekordboxHubView.swift; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Sources/MixPilotApp/RekordboxHubView.swift
            git commit -m "fix: restore Rekordbox Hub preparation preview [skip ci]"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Validate audit scripts
        run: |
          python3 -m py_compile Scripts/ultimate_repository_audit.py
          python3 -m py_compile Scripts/architecture_counter_audit.py

      - name: Run both independent repository audits
        shell: bash
        run: |
          set +e
          python3 Scripts/ultimate_repository_audit.py --output-dir ultimate-audit
          first_status=$?
          python3 Scripts/architecture_counter_audit.py --output-dir architecture-counter-audit
          second_status=$?
          set -e
          if (( first_status != 0 || second_status != 0 )); then
            echo "At least one repository audit reported blocking findings."
            exit 1
          fi

      - name: Verify both reports and publish proof
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          reports = (
              Path("ultimate-audit/ultimate-audit.json"),
              Path("architecture-counter-audit/architecture-counter-audit.json"),
          )
          summaries = []
          for report_path in reports:
              report = json.loads(report_path.read_text(encoding="utf-8"))
              summary = report.get("summary", {})
              if summary.get("errors") != 0:
                  raise SystemExit(f"{report_path} contains blocking errors")
              if summary.get("git_head") != head:
                  raise SystemExit(f"{report_path} does not match {head}")
              summaries.append((report_path.name, summary))

          lines = [
              "## ✅ Double audit MixPilot validé",
              "",
              f"SHA audité : `{head}`",
              "",
          ]
          for name, summary in summaries:
              lines.append(
                  f"- **{name}** — erreurs : {summary.get('errors', 0)}, "
                  f"avertissements : {summary.get('warnings', 0)}, "
                  f"fichiers : {summary.get('files_scanned', summary.get('files', 'n/a'))}"
              )
          lines.extend([
              "",
              "Contrats Hub confirmés : acteur d’I/O dédié, deux opérations asynchrones et `preparationPreview` conservé.",
          ])
          Path("audit-comment.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          gh pr comment "$PR_NUMBER" --body-file audit-comment.md

      - name: Upload complete audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-final-dual-audit
          path: |
            ultimate-audit
            architecture-counter-audit
          if-no-files-found: error
