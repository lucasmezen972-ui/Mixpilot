name: Apply Rekordbox Hub async I/O patch

on:
  push:
    branches:
      - audit/ultimate-hardening-final
    paths:
      - .audit/apply-rekordbox-hub-patch

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/ultimate-hardening-final
      - name: Apply verified model-only patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Sources/MixPilotApp/RekordboxHubView.swift")
          source = path.read_text(encoding="utf-8")
          view_marker = "private enum RekordboxHubSection"
          original_tail = source[source.index(view_marker):]

          imports_marker = "import UniformTypeIdentifiers\n\n@MainActor\n"
          actor_block = '''import UniformTypeIdentifiers

private actor RekordboxHubFileStore {
    func importLibrary(
        at url: URL,
        installedVersion: String?
    ) throws -> RekordboxLibraryImportResult {
        let data = try Data(contentsOf: url)
        return try RekordboxLibraryImporter().importData(
            data,
            fileExtension: url.pathExtension,
            installedVersion: installedVersion
        )
    }

    func writeAndVerify(_ data: Data, to url: URL) throws {
        try data.write(to: url, options: .atomic)
        guard try Data(contentsOf: url) == data else {
            throw CocoaError(.fileWriteUnknown)
        }
    }
}

@MainActor
'''
          if imports_marker not in source:
              raise SystemExit("Expected Hub import marker is missing or already modified.")
          source = source.replace(imports_marker, actor_block, 1)

          old_property = "    private let importer = RekordboxLibraryImporter()"
          new_property = "    private let fileStore = RekordboxHubFileStore()"
          if source.count(old_property) != 1:
              raise SystemExit("Expected importer property was not found exactly once.")
          source = source.replace(old_property, new_property, 1)

          import_start = source.index("    func importLibrary(at url: URL) {")
          import_end = source.index("\n    func generatePreset", import_start)
          new_import = '''    func importLibrary(at url: URL) {
        guard !isWorking else { return }
        isWorking = true
        status = "Import de \(url.lastPathComponent)…"
        let installedVersion = rekordboxVersion

        let fileStore = self.fileStore
        Task { @MainActor [weak self, fileStore] in
            guard let self else { return }
            defer { isWorking = false }
            do {
                let result = try await fileStore.importLibrary(
                    at: url,
                    installedVersion: installedVersion
                )
                importResult = result
                sourceFilename = url.lastPathComponent
                status = "\(result.tracks.count) titre(s), \(result.playlists.count) playlist(s) • \(result.source.displayName)"
            } catch {
                importResult = nil
                sourceFilename = nil
                status = "Import refusé : \(error.localizedDescription)"
            }
        }
    }
'''
          source = source[:import_start] + new_import + source[import_end:]

          export_start = source.index("    func exportPreset(profile: MIDIMappingProfile) {")
          class_end = source.index("\n}\n\n" + view_marker, export_start)
          new_export = '''    func exportPreset(profile: MIDIMappingProfile) {
        guard !isWorking else { return }
        if lastPreset == nil { generatePreset(profile: profile) }
        guard let preset = lastPreset else { return }
        let panel = NSSavePanel()
        panel.title = "Exporter le mapping rekordbox avancé"
        panel.nameFieldStringValue = "MixPilot Virtual Controller Advanced.midi.csv"
        panel.allowedContentTypes = [.commaSeparatedText]
        guard panel.runModal() == .OK, let url = panel.url else { return }

        isWorking = true
        status = "Export et vérification de \(url.lastPathComponent)…"
        let data = Data(preset.csv.utf8)
        let fileStore = self.fileStore
        Task { @MainActor [weak self, fileStore] in
            guard let self else { return }
            defer { isWorking = false }
            do {
                try await fileStore.writeAndVerify(data, to: url)
                presetURL = url
                NSWorkspace.shared.activateFileViewerSelecting([url])
                status = "Preset exporté et vérifié : \(url.lastPathComponent)"
            } catch {
                status = "Échec de l’export : \(error.localizedDescription)"
            }
        }
    }
'''
          source = source[:export_start] + new_export + source[class_end:]

          if source[source.index(view_marker):] != original_tail:
              raise SystemExit("The SwiftUI view changed outside the Hub model.")
          if source.count("Data(contentsOf:") != 2:
              raise SystemExit("Unexpected synchronous read count after patch.")
          if source.index("Data(contentsOf:") > source.index("@MainActor"):
              raise SystemExit("A synchronous read still exists inside the MainActor model.")
          if source.count("Task { @MainActor [weak self, fileStore] in") != 2:
              raise SystemExit("Both asynchronous model operations were not installed.")

          path.write_text(source, encoding="utf-8")
          PY
          git diff --check
          git diff --stat
          git diff -- Sources/MixPilotApp/RekordboxHubView.swift
      - name: Commit only the verified Hub change
        shell: bash
        run: |
          set -euo pipefail
          test -n "$(git status --porcelain -- Sources/MixPilotApp/RekordboxHubView.swift)"
          test -z "$(git status --porcelain --untracked-files=no | grep -v 'Sources/MixPilotApp/RekordboxHubView.swift' || true)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Sources/MixPilotApp/RekordboxHubView.swift
          git commit -m "fix: move Rekordbox Hub file I/O off MainActor [skip ci]"
          git push origin HEAD:audit/ultimate-hardening-final
