name: macOS CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: mixpilot-macos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Unit tests
        id: unit-tests
        shell: bash
        run: |
          set +e
          swift test --parallel > unit-test.log 2>&1
          status=$?
          cat unit-test.log
          exit $status
      - name: Upload unit-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
      - name: Long simulation
        run: swift run MixPilotSimulatorCLI --tracks 50 --inject-failures
      - name: Build macOS application
        run: swift build -c release --product MixPilotAutopilot
      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-validation-${{ github.run_number }}
          path: unit-test.log
