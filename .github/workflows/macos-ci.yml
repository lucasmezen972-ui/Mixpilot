name: macOS CI

# Temporarily manual-only while GitHub Actions fails before checkout with
# `steps: none`. Restore pull_request/push triggers after account-level runner
# execution is confirmed. This prevents notification spam without deleting CI.
on:
  workflow_dispatch:

concurrency:
  group: mixpilot-macos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version
          chmod +x Scripts/*.sh
      - name: Package manifest consistency
        run: ./Scripts/check_package_manifest.sh
      - name: Source architecture consistency
        run: ./Scripts/check_source_architecture.sh
      - name: Runtime safety consistency
        run: ./Scripts/check_runtime_safety.sh
      - name: Documentation consistency
        run: ./Scripts/check_documentation_consistency.sh
      - name: Localization consistency
        run: python3 Scripts/check_localization_consistency.py
      - name: Unit tests
        id: unit-tests
        shell: bash
        run: |
          set +e
          swift test --parallel > unit-test.log 2>&1
          status=$?
          cat unit-test.log
          exit $status
      - name: Upload unit-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
      - name: Verify immutable GitHub mapping manifest
        run: ./Scripts/verify_mapping_provenance.sh | tee mapping-provenance-check.json
      - name: Optional live Supabase auth and RLS probe
        id: cloud-probe
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./Scripts/cloud_self_test.sh | tee cloud-self-test.json
      - name: Record optional cloud probe status
        if: always()
        shell: bash
        env:
          CLOUD_PROBE_OUTCOME: ${{ steps.cloud-probe.outcome }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          Path("cloud-self-test-status.json").write_text(json.dumps({
              "required_for_local_build": False,
              "outcome": os.environ.get("CLOUD_PROBE_OUTCOME", "unknown"),
              "reason": "Online services are optional and must not block local Live, tests, builds, or packaging.",
          }, ensure_ascii=False, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - name: Generate remote mapping candidate
        run: |
          swift run MixPilotMappingPublisherCLI \
            --mapping-version ${{ github.run_number }} \
            --minimum-app-build 1 \
            --rollout 0 \
            --output mapping-release-candidate.json
          test -s mapping-release-candidate.json
      - name: Simulation 50 tracks with failures
        shell: bash
        run: |
          set -o pipefail
          swift run MixPilotSimulatorCLI --tracks 50 --backend all --inject-failures | tee simulation-50-report.json
      - name: Simulation 250 tracks with failures
        shell: bash
        run: |
          set -o pipefail
          swift run MixPilotSimulatorCLI --tracks 250 --backend all --inject-failures | tee simulation-250-report.json
      - name: Build macOS products
        run: |
          swift build -c release --product MixPilotAutopilot
          swift build -c release --product MixPilotHardwareProbeCLI
      - name: Package development DMG
        env:
          MIXPILOT_VERSION: 0.3.${{ github.run_number }}
        run: |
          ./Scripts/build_release.sh
          ./Scripts/package_dmg.sh
      - name: Verify DMG checksum
        run: |
          cd build
          shasum -a 256 -c MixPilot-Autopilot.dmg.sha256
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-Validation-Reports
          path: |
            simulation-50-report.json
            simulation-250-report.json
            mapping-release-candidate.json
            mapping-provenance-check.json
            cloud-self-test.json
            cloud-self-test-status.json
            unit-test.log
          if-no-files-found: warn
      - name: Upload installable DMG
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-Autopilot-development
          path: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
