name: macOS CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "integration/**"
      - "release/**"

concurrency:
  group: mixpilot-macos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version
          chmod +x Scripts/*.sh

      - name: Unit tests
        id: unit-tests
        shell: bash
        run: |
          set +e
          swift test --parallel > unit-test.log 2>&1
          status=$?
          cat unit-test.log
          exit $status

      - name: Upload unit-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log

      - name: Simulation 50 tracks with failures
        shell: bash
        run: |
          set -o pipefail
          swift run MixPilotSimulatorCLI --tracks 50 --inject-failures | tee simulation-50-report.json

      - name: Simulation 250 tracks with failures
        shell: bash
        run: |
          set -o pipefail
          swift run MixPilotSimulatorCLI --tracks 250 --inject-failures | tee simulation-250-report.json

      - name: Build macOS products
        run: |
          swift build -c release --product MixPilotAutopilot
          swift build -c release --product MixPilotHardwareProbeCLI

      - name: Package development DMG
        env:
          MIXPILOT_VERSION: 0.3.${{ github.run_number }}
        run: |
          ./Scripts/build_release.sh
          ./Scripts/package_dmg.sh

      - name: Verify DMG checksum
        run: shasum -a 256 -c build/MixPilot-Autopilot.dmg.sha256

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-Validation-Reports
          path: |
            simulation-50-report.json
            simulation-250-report.json
            unit-test.log
          if-no-files-found: warn

      - name: Upload installable DMG
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-Autopilot-development
          path: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
