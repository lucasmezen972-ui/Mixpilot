name: macOS CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: mixpilot-macos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version
          chmod +x Scripts/*.sh
      - name: Unit tests
        id: unit-tests
        shell: bash
        run: |
          set +e
          swift test --parallel > unit-test.log 2>&1
          status=$?
          cat unit-test.log
          exit $status
      - name: Upload unit-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
      - name: Long simulation and failure matrix
        shell: bash
        run: |
          set -o pipefail
          swift run MixPilotSimulatorCLI --tracks 50 --inject-failures | tee simulation-report.json
      - name: Build macOS products
        run: |
          swift build -c release --product MixPilotAutopilot
          swift build -c release --product MixPilotHardwareProbeCLI
      - name: Package development DMG
        env:
          MIXPILOT_VERSION: 0.3.${{ github.run_number }}
        run: |
          ./Scripts/build_release.sh
          ./Scripts/package_dmg.sh
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-Validation-Reports
          path: |
            simulation-report.json
            unit-test.log
          if-no-files-found: warn
      - name: Upload installable DMG
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-Autopilot-development
          path: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
