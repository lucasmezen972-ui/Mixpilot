name: Final release hardening PR

on:
  pull_request:
    branches:
      - consolidation/security-cloud-trust
    paths:
      - .github/final-release-hardening-trigger.txt

permissions:
  contents: write

concurrency:
  group: mixpilot-final-release-hardening
  cancel-in-progress: false

jobs:
  patch-test-package:
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout consolidation branch
        uses: actions/checkout@v4
        with:
          ref: consolidation/security-cloud-trust
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure commit identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Make patch matching deterministic
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("Scripts/apply_final_release_hardening.py")
          text = path.read_text(encoding="utf-8")
          old = '''    replace_once(
                  path,
                  '        rel = file_path.relative_to(ROOT).as_posix()\\n        try:\\n            text = file_path.read_text(encoding="utf-8")',
                  '        rel = file_path.relative_to(ROOT).as_posix()\\n        mark_check(2)\\n        try:\\n            text = file_path.read_text(encoding="utf-8")',
              )'''
          new = '''    replace_all(
                  path,
                  '        rel = file_path.relative_to(ROOT).as_posix()\\n        try:\\n            text = file_path.read_text(encoding="utf-8")',
                  '        rel = file_path.relative_to(ROOT).as_posix()\\n        mark_check(2)\\n        try:\\n            text = file_path.read_text(encoding="utf-8")',
                  expected=1,
              )'''
          if text.count(old) != 1:
              raise SystemExit("Could not specialize the one-shot audit patch.")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Apply final hardening patch
        run: python3 Scripts/apply_final_release_hardening.py
      - name: Remove temporary trigger and diagnostic files
        shell: bash
        run: |
          rm -f \
            .github/final-release-hardening-trigger.txt \
            .github/final-release-hardening-trigger-branch.txt \
            .github/final-release-hardening-pr-trigger.txt \
            .github/unused-placeholder.txt \
            .github/placeholder-final.txt \
            .github/workflows/final-release-hardening-debug.yml
      - name: Validate patch shape
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Scripts/*.sh
          git diff --check
          test ! -e Scripts/apply_final_release_hardening.py
          test ! -e .github/workflows/final-release-hardening-pr.yml
          test ! -e .github/workflows/final-release-hardening-debug.yml
          test ! -e .github/final-release-hardening-trigger.txt
          test -x Scripts/verify_release_hygiene.sh
          grep -q 'CHECKS_EXECUTED' Scripts/architecture_counter_audit.py
          grep -q 'verify_release_hygiene.sh' .github/workflows/final-pr-validation.yml
          grep -q '/usr/bin/strip -S' Scripts/build_release.sh
          grep -q -- '--noextattr' Scripts/package_dmg.sh
          if grep -R -n '/Users/' Tests Sources Mobile Shared 2>/dev/null; then
            echo "A tracked user-home literal remains." >&2
            exit 1
          fi
      - name: Commit candidate locally
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git commit -m "fix: harden final audits and clean release payload [skip ci]"
      - name: Run both audits with real coverage
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile Scripts/ultimate_repository_audit.py
          python3 -m py_compile Scripts/architecture_counter_audit.py
          python3 Scripts/ultimate_repository_audit.py --output-dir ultimate-audit
          python3 Scripts/architecture_counter_audit.py --output-dir architecture-counter-audit
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in (
              Path("ultimate-audit/ultimate-audit.json"),
              Path("architecture-counter-audit/architecture-counter-audit.json"),
          ):
              report = json.loads(path.read_text(encoding="utf-8"))
              summary = report["summary"]
              if summary.get("errors") != 0:
                  raise SystemExit(f"{path} contains blocking errors")
              if path.name == "architecture-counter-audit.json" and summary.get("checks", 0) < 50:
                  raise SystemExit(f"Counter-audit coverage is too low: {summary.get('checks')}")
          PY
      - name: Run complete Swift tests
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          swift test --parallel 2>&1 | tee swift-test.log
      - name: Build clean release and DMG
        env:
          MIXPILOT_VERSION: 0.4.3-final
          CODE_SIGN_IDENTITY: "-"
        shell: bash
        run: |
          set -euo pipefail
          ./Scripts/build_release.sh
          ./Scripts/package_dmg.sh
          cd build
          shasum -a 256 -c MixPilot-Autopilot.dmg.sha256
      - name: Push validated hardening commit
        shell: bash
        run: git push origin HEAD:consolidation/security-cloud-trust
      - name: Upload clean DMG
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-0.4.3-final-clean
          path: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
            ultimate-audit
            architecture-counter-audit
          if-no-files-found: error
