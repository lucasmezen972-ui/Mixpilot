name: One-shot atomic cloud command client wiring

on:
  push:
    branches:
      - consolidation/security-cloud-trust
  pull_request:
    branches:
      - consolidation/rekordbox-spotify-readiness

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: consolidation/security-cloud-trust
          fetch-depth: 0

      - name: Replace direct table polling with atomic RPCs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('Sources/MixPilotSystem/MixPilotCloudService.swift')
          text = path.read_text(encoding='utf-8')

          literals = [
              (
                  '    private let installationID: UUID\n    private let encoder: JSONEncoder',
                  '    private let installationID: UUID\n    private let commandAgentInstanceID: String?\n    private let encoder: JSONEncoder',
              ),
              (
                  '        self.installationID = Self.loadInstallationID()\n\n        let encoder = JSONEncoder()',
                  '        self.installationID = Self.loadInstallationID()\n        self.commandAgentInstanceID = try? MixPilotCloudAgentIdentityStore().loadOrCreate()\n\n        let encoder = JSONEncoder()',
              ),
          ]

          for old, new in literals:
              if text.count(old) == 1:
                  text = text.replace(old, new)
              elif text.count(new) != 1:
                  raise SystemExit(f'unsafe literal patch state for {old!r}')

          pending_pattern = re.compile(
              r'    public func pendingCommands\(\) async throws -> \[MixPilotCloudCommand\] \{.*?\n    \}\n\n(?=    public func completeCommand)',
              re.S,
          )
          pending_replacement = '''    public func pendingCommands() async throws -> [MixPilotCloudCommand] {
        guard let context else { return [] }
        guard let commandAgentInstanceID else {
            throw MixPilotCloudCommandError.agentIdentityUnavailable
        }
        let authSession = try await authenticatedSession()
        return try await performRequest(
            path: "rest/v1/rpc/claim_mixpilot_commands",
            method: "POST",
            accessToken: authSession.accessToken,
            body: MixPilotCloudCommandClaimRequest(
                deviceID: context.deviceID,
                instanceID: commandAgentInstanceID,
                limit: 10
            )
        )
    }

'''
          text, count = pending_pattern.subn(pending_replacement, text, count=1)
          if count != 1 and text.count('rest/v1/rpc/claim_mixpilot_commands') != 1:
              raise SystemExit(f'unsafe pendingCommands patch state: {count}')

          completion_pattern = re.compile(
              r'    public func completeCommand\(\n        _ command: MixPilotCloudCommand,\n        succeeded: Bool,\n        result: \[String: String\]\n    \) async throws \{.*?\n    \}\n\n(?=    public func closeSession)',
              re.S,
          )
          completion_replacement = '''    public func completeCommand(
        _ command: MixPilotCloudCommand,
        succeeded: Bool,
        result: [String: String]
    ) async throws {
        guard let commandAgentInstanceID else {
            throw MixPilotCloudCommandError.agentIdentityUnavailable
        }
        let authSession = try await authenticatedSession()
        let completed: Bool = try await performRequest(
            path: "rest/v1/rpc/complete_mixpilot_command",
            method: "POST",
            accessToken: authSession.accessToken,
            body: MixPilotCloudCommandCompletionRequest(
                commandID: command.id,
                instanceID: commandAgentInstanceID,
                succeeded: succeeded,
                result: result,
                failureCode: succeeded ? nil : (result["error"] ?? "command_failed")
            )
        )
        guard completed else {
            throw MixPilotCloudCommandError.completionRejected
        }
    }

'''
          text, count = completion_pattern.subn(completion_replacement, text, count=1)
          if count != 1 and text.count('rest/v1/rpc/complete_mixpilot_command') != 1:
              raise SystemExit(f'unsafe completeCommand patch state: {count}')

          legacy_row_pattern = re.compile(
              r'\nprivate struct CommandCompletionRow: Encodable \{.*?\n\}\n',
              re.S,
          )
          text, count = legacy_row_pattern.subn('\n', text, count=1)
          if count != 1 and 'private struct CommandCompletionRow' in text:
              raise SystemExit(f'unsafe legacy completion row patch state: {count}')

          path.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/wire-atomic-cloud-command-client.yml
          git diff --check

      - name: Commit atomic client and remove helper
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Sources/MixPilotSystem/MixPilotCloudService.swift .github/workflows/wire-atomic-cloud-command-client.yml
          git commit -m "Use atomic cloud command RPCs"
          git push origin HEAD:consolidation/security-cloud-trust
