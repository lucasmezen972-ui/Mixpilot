name: Autopilot Long Simulation

# Temporarily manual-only while GitHub Actions fails before checkout with
# `steps: none`. Restore scheduled runs only after runner execution is confirmed.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mixpilot-long-simulation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulate:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Toolchain
        run: swift --version

      - name: Runtime safety consistency
        run: bash Scripts/check_runtime_safety.sh

      - name: Transport reliability consistency
        run: bash Scripts/check_transport_reliability.sh

      - name: Validation context consistency
        run: bash Scripts/check_validation_context.sh

      - name: Simulate 250 tracks with recoverable failures
        run: swift run MixPilotSimulatorCLI --tracks 250 --backend all --inject-failures
