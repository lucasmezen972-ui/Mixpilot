name: Autopilot Long Simulation

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  simulate:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Simulate 250 tracks with recoverable failures
        run: swift run MixPilotSimulatorCLI --tracks 250 --inject-failures
