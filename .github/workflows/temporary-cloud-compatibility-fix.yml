name: Temporary Cloud Compatibility Fix

on:
  pull_request_target:
    types: [reopened]
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'consolidation/security-cloud-trust'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Repair cloud compatibility contracts atomically
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          service_path = Path("Sources/MixPilotSystem/MixPilotCloudService.swift")
          legacy_path = Path("Sources/MixPilotSystem/MixPilotCloudService+LegacyCompatibility.swift")
          test_path = Path("Tests/MixPilotSystemTests/CloudLegacyCompatibilityTests.swift")

          service = service_path.read_text(encoding="utf-8")
          stale_identity = "MixPilotCloudAgentIdentityStore().loadOrCreate().instanceID"
          if service.count(stale_identity) != 1:
              raise SystemExit("Expected exactly one stale cloud-agent identity access.")
          service = service.replace(
              stale_identity,
              "MixPilotCloudAgentIdentityStore().loadOrCreate()",
              1,
          )

          legacy = dedent('''\
          #if os(macOS)
          import Foundation
          import MixPilotCore

          public extension MixPilotCloudService {
              @available(*, deprecated, message: "Pass an explicit MixPilotCloudBackendContext")
              func connect(
                  appVersion: String,
                  appBuild: Int,
                  rekordboxVersion: String?,
                  liveMode: Bool
              ) async throws -> UUID {
                  try await connect(
                      appVersion: appVersion,
                      appBuild: appBuild,
                      backend: legacyRekordboxContext(rekordboxVersion: rekordboxVersion),
                      liveMode: liveMode,
                      telemetryEnabled: MixPilotOnlineDiagnosticsPreferences().isEnabled
                  )
              }

              @available(*, deprecated, message: "Pass an explicit MixPilotCloudBackendContext")
              func heartbeat(
                  appVersion: String,
                  appBuild: Int,
                  rekordboxVersion: String?,
                  liveMode: Bool
              ) async throws {
                  try await heartbeat(
                      appVersion: appVersion,
                      appBuild: appBuild,
                      backend: legacyRekordboxContext(rekordboxVersion: rekordboxVersion),
                      liveMode: liveMode,
                      telemetryEnabled: MixPilotOnlineDiagnosticsPreferences().isEnabled
                  )
              }

              /// This overload predates multi-backend support and only exposes a
              /// `rekordboxVersion` argument. Preserve source compatibility without reading
              /// any hidden global selection state; new callers must pass an explicit context.
              private func legacyRekordboxContext(
                  rekordboxVersion: String?
              ) -> MixPilotCloudBackendContext {
                  MixPilotCloudBackendContext(
                      identifier: .rekordbox,
                      softwareVersion: rekordboxVersion,
                      controllerName: "MixPilot Virtual Controller",
                      mappingVersion: nil,
                      mappingSHA256: nil,
                      capabilities: DJBackendCapabilities(),
                      validationStatus: DJValidationStatus.requiresBackendValidation.rawValue
                  )
              }
          }
          #endif
          ''')

          test = dedent('''\
          import Foundation
          import XCTest

          final class CloudLegacyCompatibilityTests: XCTestCase {
              func testLegacyAdapterMatchesCurrentCloudContracts() throws {
                  let service = try sourceFile("Sources/MixPilotSystem/MixPilotCloudService.swift")
                  let legacy = try sourceFile("Sources/MixPilotSystem/MixPilotCloudService+LegacyCompatibility.swift")

                  XCTAssertFalse(service.contains("loadOrCreate().instanceID"))
                  XCTAssertTrue(service.contains("MixPilotCloudAgentIdentityStore().loadOrCreate()"))
                  XCTAssertFalse(legacy.contains("MixPilotCloudContext"))
                  XCTAssertTrue(legacy.contains("async throws -> UUID"))
                  XCTAssertTrue(legacy.contains("capabilities: DJBackendCapabilities()"))
                  XCTAssertTrue(legacy.contains(
                      "validationStatus: DJValidationStatus.requiresBackendValidation.rawValue"
                  ))
              }

              private func sourceFile(_ path: String) throws -> String {
                  try String(
                      contentsOf: repositoryRoot().appendingPathComponent(path),
                      encoding: .utf8
                  )
              }

              private func repositoryRoot() -> URL {
                  var url = URL(fileURLWithPath: #filePath)
                  for _ in 0..<3 {
                      url.deleteLastPathComponent()
                  }
                  return url
              }
          }
          ''')

          if "loadOrCreate().instanceID" in service:
              raise SystemExit("Stale identity member access remains.")
          if "MixPilotCloudContext" in legacy:
              raise SystemExit("Stale legacy context type remains.")
          if legacy.count("DJValidationStatus.requiresBackendValidation.rawValue") != 1:
              raise SystemExit("Legacy validation status is missing or duplicated.")

          service_path.write_text(service, encoding="utf-8")
          legacy_path.write_text(legacy, encoding="utf-8")
          test_path.write_text(test, encoding="utf-8")
          PY

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Sources/MixPilotSystem/MixPilotCloudService.swift \
            Sources/MixPilotSystem/MixPilotCloudService+LegacyCompatibility.swift \
            Tests/MixPilotSystemTests/CloudLegacyCompatibilityTests.swift
          git commit -m "fix: align legacy cloud contracts with current service API"
          new_sha=$(git rev-parse HEAD)
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          gh pr comment "$PR_NUMBER" --body "✅ Correctif de compatibilité cloud poussé sur \`$new_sha\` : identité d’agent alignée, adaptateur legacy migré vers UUID et test anti-régression ajouté."
