name: Apply one-shot async mapping patch

on:
  push:
    branches:
      - consolidation/rekordbox-spotify-readiness

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message == 'ci: add one-shot async mapping patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: consolidation/rekordbox-spotify-readiness
          fetch-depth: 0

      - name: Apply exact async send-result patches
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path('Sources/MixPilotApp/RekordboxCompatibilityLabView.swift'): (
                  '        Button { appModel.testMapping(action) } label: {',
                  '''        Button {
              Task { @MainActor in
                  _ = await appModel.testMapping(action)
              }
          } label: {'''
              ),
              Path('Sources/MixPilotApp/RekordboxDeviceValidationView.swift'): (
                  '''                    Button("ENVOYER LE TEST") {
                          appModel.testMapping(command.action)
                          session.markSent(command)
                      }''',
                  '''                    Button("ENVOYER LE TEST") {
                          Task { @MainActor in
                              let result = await appModel.testMapping(command.action)
                              if case .sent = result {
                                  session.markSent(command)
                              }
                          }
                      }'''
              ),
              Path('Sources/MixPilotApp/RekordboxHubView.swift'): (
                  '''        Button {
              appModel.testMapping(action)
          } label: {''',
                  '''        Button {
              Task { @MainActor in
                  _ = await appModel.testMapping(action)
              }
          } label: {'''
              ),
          }

          for path, (old, new) in replacements.items():
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {count}')
              path.write_text(text.replace(old, new, 1))
          PY

          git diff --check
          grep -R "appModel.testMapping(action)" -n Sources/MixPilotApp/RekordboxCompatibilityLabView.swift Sources/MixPilotApp/RekordboxHubView.swift || true
          grep -n -A8 -B2 'ENVOYER LE TEST' Sources/MixPilotApp/RekordboxDeviceValidationView.swift

      - name: Commit focused source patch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Sources/MixPilotApp/RekordboxCompatibilityLabView.swift \
                  Sources/MixPilotApp/RekordboxDeviceValidationView.swift \
                  Sources/MixPilotApp/RekordboxHubView.swift
          git commit -m 'Fix async Rekordbox mapping test callers'
          git push origin HEAD:consolidation/rekordbox-spotify-readiness
