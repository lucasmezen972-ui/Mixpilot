name: Apply one-shot async mapping patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'consolidation/rekordbox-spotify-readiness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: consolidation/rekordbox-spotify-readiness
          fetch-depth: 0

      - name: Apply bounded async send-result patches
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          patches = [
              (
                  Path('Sources/MixPilotApp/RekordboxCompatibilityLabView.swift'),
                  re.compile(r'(?m)^(?P<i>\s*)Button\s*\{\s*appModel\.testMapping\(action\)\s*\}\s*label:\s*\{'),
                  lambda m: (
                      f"{m.group('i')}Button {{\n"
                      f"{m.group('i')}    Task {{ @MainActor in\n"
                      f"{m.group('i')}        _ = await appModel.testMapping(action)\n"
                      f"{m.group('i')}    }}\n"
                      f"{m.group('i')}}} label: {{"
                  ),
                  'await appModel.testMapping(action)'
              ),
              (
                  Path('Sources/MixPilotApp/RekordboxDeviceValidationView.swift'),
                  re.compile(
                      r'(?m)^(?P<i>\s*)Button\("ENVOYER LE TEST"\)\s*\{\s*'
                      r'appModel\.testMapping\(command\.action\)\s*'
                      r'session\.markSent\(command\)\s*\}'
                  ),
                  lambda m: (
                      f"{m.group('i')}Button(\"ENVOYER LE TEST\") {{\n"
                      f"{m.group('i')}    Task {{ @MainActor in\n"
                      f"{m.group('i')}        let result = await appModel.testMapping(command.action)\n"
                      f"{m.group('i')}        if case .sent = result {{\n"
                      f"{m.group('i')}            session.markSent(command)\n"
                      f"{m.group('i')}        }}\n"
                      f"{m.group('i')}    }}\n"
                      f"{m.group('i')}}}"
                  ),
                  'let result = await appModel.testMapping(command.action)'
              ),
              (
                  Path('Sources/MixPilotApp/RekordboxHubView.swift'),
                  re.compile(r'(?m)^(?P<i>\s*)Button\s*\{\s*appModel\.testMapping\(action\)\s*\}\s*label:\s*\{'),
                  lambda m: (
                      f"{m.group('i')}Button {{\n"
                      f"{m.group('i')}    Task {{ @MainActor in\n"
                      f"{m.group('i')}        _ = await appModel.testMapping(action)\n"
                      f"{m.group('i')}    }}\n"
                      f"{m.group('i')}}} label: {{"
                  ),
                  'await appModel.testMapping(action)'
              ),
          ]

          for path, pattern, replacement, corrected_marker in patches:
              text = path.read_text()
              matches = list(pattern.finditer(text))
              if len(matches) == 1:
                  text, count = pattern.subn(replacement, text, count=1)
                  if count != 1:
                      raise SystemExit(f'{path}: replacement failed')
                  path.write_text(text)
              elif len(matches) == 0 and text.count(corrected_marker) == 1:
                  continue
              else:
                  raise SystemExit(
                      f'{path}: unsafe patch state matches={len(matches)} corrected={text.count(corrected_marker)}'
                  )
          PY

          git diff --check

      - name: Commit focused source patch when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Source callers already corrected.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Sources/MixPilotApp/RekordboxCompatibilityLabView.swift \
                  Sources/MixPilotApp/RekordboxDeviceValidationView.swift \
                  Sources/MixPilotApp/RekordboxHubView.swift
          git commit -m 'Fix async Rekordbox mapping test callers'
          git push origin HEAD:consolidation/rekordbox-spotify-readiness
