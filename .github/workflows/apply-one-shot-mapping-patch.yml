name: Apply one-shot async mapping patch

on:
  push:
    branches:
      - consolidation/rekordbox-spotify-readiness
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'consolidation/rekordbox-spotify-readiness' || github.ref_name == 'consolidation/rekordbox-spotify-readiness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: consolidation/rekordbox-spotify-readiness
          fetch-depth: 0

      - name: Apply exact idempotent async send-result patches
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path('Sources/MixPilotApp/RekordboxCompatibilityLabView.swift'): (
                  '        Button { appModel.testMapping(action) } label: {',
                  '''        Button {
              Task { @MainActor in
                  _ = await appModel.testMapping(action)
              }
          } label: {'''
              ),
              Path('Sources/MixPilotApp/RekordboxDeviceValidationView.swift'): (
                  '''                    Button("ENVOYER LE TEST") {
                          appModel.testMapping(command.action)
                          session.markSent(command)
                      }''',
                  '''                    Button("ENVOYER LE TEST") {
                          Task { @MainActor in
                              let result = await appModel.testMapping(command.action)
                              if case .sent = result {
                                  session.markSent(command)
                              }
                          }
                      }'''
              ),
              Path('Sources/MixPilotApp/RekordboxHubView.swift'): (
                  '''        Button {
              appModel.testMapping(action)
          } label: {''',
                  '''        Button {
              Task { @MainActor in
                  _ = await appModel.testMapping(action)
              }
          } label: {'''
              ),
          }

          for path, (old, new) in replacements.items():
              text = path.read_text()
              old_count = text.count(old)
              new_count = text.count(new)
              if old_count == 1 and new_count == 0:
                  path.write_text(text.replace(old, new, 1))
              elif old_count == 0 and new_count == 1:
                  continue
              else:
                  raise SystemExit(
                      f'{path}: unsafe patch state old={old_count} new={new_count}'
                  )
          PY

          git diff --check

      - name: Commit focused source patch when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Source callers already corrected.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Sources/MixPilotApp/RekordboxCompatibilityLabView.swift \
                  Sources/MixPilotApp/RekordboxDeviceValidationView.swift \
                  Sources/MixPilotApp/RekordboxHubView.swift
          git commit -m 'Fix async Rekordbox mapping test callers'
          git push origin HEAD:consolidation/rekordbox-spotify-readiness
