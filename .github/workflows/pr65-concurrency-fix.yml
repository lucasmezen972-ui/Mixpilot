name: PR65 concurrency fix

on:
  push:
    branches:
      - fix/final-release-hardening-main
    paths:
      - .github/pr65-concurrency-fix.trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/final-release-hardening-main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply exact findings
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match in {path}, found {count}: {old!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "Scripts/architecture_counter_audit.py",
              '("pendingAuthenticationSessionID", "spotify-session-id-missing", "Spotify callbacks are not bound to a session identifier."),',
              '("webAuthenticationSessionID", "spotify-session-id-missing", "Spotify callbacks are not bound to a session identifier."),',
          )
          replace_once(
              "Scripts/architecture_counter_audit.py",
              '("guard pendingAuthenticationSessionID == sessionID", "spotify-stale-callback-guard-missing", "Stale Spotify callbacks are not rejected."),',
              '("guard webAuthenticationSessionID == sessionID", "spotify-stale-callback-guard-missing", "Stale Spotify callbacks are not rejected."),',
          )
          replace_once(
              "Sources/MixPilotRemoteBridge/MixPilotRemoteBridge.swift",
              'private final class MixPilotRemoteClientSession: @unchecked Sendable {',
              '// SAFETY: Network callbacks only touch the lock-protected closed flag; all pairing, protocol and subscription state is read or mutated after an explicit hop to MainActor. NWConnection is designed for cross-queue use.\nprivate final class MixPilotRemoteClientSession: @unchecked Sendable {',
          )
          replace_once(
              "Sources/MixPilotRemoteBridge/MixPilotRemoteBridge.swift",
              '@MainActor\npublic final class MixPilotRemoteBridge: ObservableObject, @unchecked Sendable {',
              '@MainActor\n// SAFETY: The bridge is globally MainActor-isolated. Network framework callbacks capture it only to create a Task that hops back to MainActor before accessing state.\npublic final class MixPilotRemoteBridge: ObservableObject, @unchecked Sendable {',
          )
          replace_once(
              "Sources/MixPilotSystem/PreparationAudioCapture.swift",
              'public final class PreparationAudioCapture: @unchecked Sendable {',
              '// SAFETY: Every mutable capture field and AVAudioEngine lifecycle transition is serialized by lock; the audio tap calls append(), which uses the same lock.\npublic final class PreparationAudioCapture: @unchecked Sendable {',
          )
          PY
          rm -f .github/workflows/pr65-concurrency-fix.yml .github/pr65-concurrency-fix.trigger
          git diff --check
          python3 -m py_compile Scripts/architecture_counter_audit.py
      - name: Commit and push
        shell: bash
        run: |
          git config user.name "MixPilot CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix: document concurrency boundaries and align Spotify audit"
          git push origin HEAD:fix/final-release-hardening-main
