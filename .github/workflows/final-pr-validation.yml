name: Final PR Validation

on:
  pull_request:
    branches:
      - main
      - consolidation/rekordbox-spotify-readiness
  workflow_dispatch:
    inputs:
      version:
        description: "Version used for the development DMG"
        required: false
        default: "0.4.4-final"
        type: string

permissions:
  contents: read

concurrency:
  group: mixpilot-final-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MIXPILOT_VALIDATION_VERSION: ${{ github.event.inputs.version || '0.4.4-final' }}

jobs:
  repository-audits:
    name: Two-pass repository audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Validate both audit scripts
        run: |
          python3 -m py_compile Scripts/ultimate_repository_audit.py
          python3 -m py_compile Scripts/architecture_counter_audit.py
      - name: Run both independent repository audits
        shell: bash
        run: |
          set +e
          python3 Scripts/ultimate_repository_audit.py --output-dir ultimate-audit
          first_status=$?
          python3 Scripts/architecture_counter_audit.py --output-dir architecture-counter-audit
          second_status=$?
          set -e
          if (( first_status != 0 || second_status != 0 )); then
            echo "At least one repository audit reported blocking findings."
            exit 1
          fi
      - name: Verify both reports target this commit
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          reports = (
              Path("ultimate-audit/ultimate-audit.json"),
              Path("architecture-counter-audit/architecture-counter-audit.json"),
          )
          for report_path in reports:
              report = json.loads(report_path.read_text(encoding="utf-8"))
              summary = report.get("summary", {})
              if summary.get("errors") != 0:
                  raise SystemExit(f"{report_path} contains blocking errors")
              if report_path.name == "architecture-counter-audit.json":
                  checks = summary.get("checks")
                  if not isinstance(checks, int) or checks < 50:
                      raise SystemExit(f"{report_path} executed insufficient checks: {checks!r}")
              if summary.get("git_head") != head:
                  raise SystemExit(f"{report_path} does not match {head}")
          PY
      - name: Upload two-pass audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-two-pass-repository-audit
          path: |
            ultimate-audit
            architecture-counter-audit
          if-no-files-found: error

  runner-smoke-ubuntu:
    name: Runner smoke test (Ubuntu)
    needs: repository-audits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: GitHub context
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Ubuntu runner"
            echo "- event: ${GITHUB_EVENT_NAME}"
            echo "- ref: ${GITHUB_REF}"
            echo "- sha: ${GITHUB_SHA}"
            echo "- runner: ${RUNNER_OS}-${RUNNER_ARCH}"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          uname -a
          df -h
          git --version
          docker version
          docker info

  fresh-supabase:
    name: Fresh Supabase migrations
    needs: runner-smoke-ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SUPABASE_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pinned Supabase CLI
        run: npm install --no-save supabase@2.109.1
      - name: Initialize local Supabase configuration when absent
        run: |
          if [[ ! -f supabase/config.toml ]]; then
            npx supabase init
          fi
      - name: Rebuild a fresh local database from migrations
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          npx supabase start 2>&1 | tee supabase-start.log
          npx supabase db reset 2>&1 | tee supabase-reset.log
          npx supabase test db 2>&1 | tee supabase-tests.log
          npx supabase migration list --local 2>&1 | tee supabase-migrations.log
      - name: Database diagnostics after failure
        if: failure()
        shell: bash
        run: |
          docker ps -a | tee docker-ps.log
          docker system df | tee docker-disk.log
          npx supabase status 2>&1 | tee supabase-status.log || true
      - name: Upload fresh-database logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-fresh-validation
          path: |
            supabase-start.log
            supabase-reset.log
            supabase-tests.log
            supabase-migrations.log
            supabase-status.log
            docker-ps.log
            docker-disk.log
          if-no-files-found: warn
      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup || true

  runner-smoke-macos:
    name: Runner smoke test (macOS)
    needs: repository-audits
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Apple toolchain context
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## macOS runner"
            echo "- event: ${GITHUB_EVENT_NAME}"
            echo "- ref: ${GITHUB_REF}"
            echo "- sha: ${GITHUB_SHA}"
            echo "- runner: ${RUNNER_OS}-${RUNNER_ARCH}"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          sw_vers
          uname -a
          df -h
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes

  apple-validation:
    name: macOS, iPhone, simulations and clean DMG
    needs: runner-smoke-macos
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Prepare scripts
        run: |
          chmod +x Scripts/*.sh
          mkdir -p static-checks
      - name: Check package manifest
        shell: bash
        run: |
          set -o pipefail
          ./Scripts/check_package_manifest.sh 2>&1 | tee static-checks/package-manifest.log
      - name: Check source architecture
        shell: bash
        run: |
          set -o pipefail
          ./Scripts/check_source_architecture.sh 2>&1 | tee static-checks/source-architecture.log
      - name: Check runtime safety
        shell: bash
        run: |
          set -o pipefail
          ./Scripts/check_runtime_safety.sh 2>&1 | tee static-checks/runtime-safety.log
      - name: Check documentation consistency
        shell: bash
        run: |
          set -o pipefail
          ./Scripts/check_documentation_consistency.sh 2>&1 | tee static-checks/documentation-consistency.log
      - name: Check help localizations
        shell: bash
        run: |
          set -o pipefail
          python3 Scripts/check_help_localizations.py 2>&1 | tee static-checks/help-localizations.log
      - name: Check transport reliability
        shell: bash
        run: |
          set -o pipefail
          ./Scripts/check_transport_reliability.sh 2>&1 | tee static-checks/transport-reliability.log
      - name: Check validation context
        shell: bash
        run: |
          set -o pipefail
          ./Scripts/check_validation_context.sh 2>&1 | tee static-checks/validation-context.log
      - name: Complete Swift test suite
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          swift test --parallel 2>&1 | tee swift-test.log
      - name: Simulate 50 tracks with failures on every backend
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          swift run MixPilotSimulatorCLI --tracks 50 --backend all --inject-failures \
            2>&1 | tee simulation-50-report.json
      - name: Simulate 250 tracks with failures on every backend
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          swift run MixPilotSimulatorCLI --tracks 250 --backend all --inject-failures \
            2>&1 | tee simulation-250-report.json
      - name: Build all macOS release products
        run: |
          swift build -c release --product MixPilotAutopilot
          swift build -c release --product MixPilotHardwareProbeCLI
          swift build -c release --product MixPilotMappingPublisherCLI
      - name: Install XcodeGen
        shell: bash
        run: |
          brew install xcodegen
          xcodegen --version
      - name: Generate iPhone project
        working-directory: Mobile/MixPilotRemote
        run: xcodegen generate
      - name: Build and XCTest iPhone Remote
        working-directory: Mobile/MixPilotRemote
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl list devices available -j > available-simulators.json
          SIMULATOR_UDID="$(python3 - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('available-simulators.json').read_text())
          for devices in payload.get('devices', {}).values():
              for device in devices:
                  if device.get('isAvailable') and 'iPhone' in device.get('name', ''):
                      print(device['udid'])
                      raise SystemExit(0)
          raise SystemExit('No available iPhone simulator was found.')
          PY
          )"
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          set -o pipefail
          xcodebuild \
            -project MixPilotRemote.xcodeproj \
            -scheme MixPilotRemote \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -resultBundlePath iphone-remote-tests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee iphone-remote-xctest.log
      - name: Build application and clean DMG
        env:
          MIXPILOT_VERSION: ${{ env.MIXPILOT_VALIDATION_VERSION }}
          CODE_SIGN_IDENTITY: "-"
        run: |
          ./Scripts/build_release.sh
          ./Scripts/package_dmg.sh
      - name: Verify application, DMG hygiene and checksum
        shell: bash
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 "build/MixPilot Autopilot.app"
          ./Scripts/verify_release_hygiene.sh
          cd build
          shasum -a 256 -c MixPilot-Autopilot.dmg.sha256
      - name: Upload clean final DMG
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-clean-DMG-${{ env.MIXPILOT_VALIDATION_VERSION }}
          path: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
          if-no-files-found: error
      - name: Validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Final validation"
            echo "- Two independent repository audits passed on the exact Git commit."
            echo "- The architecture counter-audit must execute at least 50 checks."
            echo "- The mounted DMG is inspected for user data and unexpected payloads."
            echo "- Development/ad hoc signing is accepted for this workflow."
            echo "- Developer ID and notarization are not required here."
            echo "- Physical DJ software, audio and controller tests remain separate."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload final validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-PR-final-validation-diagnostics
          path: |
            static-checks
            swift-test.log
            simulation-50-report.json
            simulation-250-report.json
            Mobile/MixPilotRemote/iphone-remote-xctest.log
            Mobile/MixPilotRemote/available-simulators.json
            Mobile/MixPilotRemote/iphone-remote-tests.xcresult
          if-no-files-found: warn
