name: Build DMG

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build application
        env:
          MIXPILOT_VERSION: ${{ github.ref_name }}
        run: ./Scripts/build_release.sh
      - name: Package DMG
        run: ./Scripts/package_dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: MixPilot-Autopilot-${{ github.ref_name }}
          path: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
          generate_release_notes: true
