name: Build DMG

# Manual-only while account-level runners are not proven to execute checkout.
# A tag or release branch can still be selected explicitly in the Run workflow UI.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version à empaqueter, par exemple 0.3.0-rc.2"
        required: false
        type: string
      pr_number:
        description: "PR facultative à commenter avec le rapport de l’artefact"
        required: false
        type: string

concurrency:
  group: mixpilot-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  HAS_SIGNING_CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
  HAS_NOTARIZATION: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}

jobs:
  package:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          requested='${{ inputs.version }}'
          if [[ -n "$requested" ]]; then
            version="$requested"
          elif [[ -f VERSION ]]; then
            version="$(tr -d '[:space:]' < VERSION)"
          else
            echo "VERSION file is missing and no workflow input was provided." >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Packaging MixPilot $version"

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version
          chmod +x Scripts/*.sh

      - name: Consistency checks
        run: |
          ./Scripts/check_package_manifest.sh
          ./Scripts/check_source_architecture.sh
          ./Scripts/check_runtime_safety.sh
          ./Scripts/check_documentation_consistency.sh
          python3 Scripts/check_localization_consistency.py
          ./Scripts/check_transport_reliability.sh
          ./Scripts/check_validation_context.sh

      - name: Unit tests
        run: swift test --parallel

      - name: Simulation 50 tracks with failures
        run: swift run MixPilotSimulatorCLI --tracks 50 --backend all --inject-failures

      - name: Simulation 250 tracks with failures
        run: swift run MixPilotSimulatorCLI --tracks 250 --backend all --inject-failures

      - name: Build hardware probe
        run: swift build -c release --product MixPilotHardwareProbeCLI

      - name: Build and test iPhone Remote for Simulator
        shell: bash
        run: |
          brew install xcodegen
          cd Mobile/MixPilotRemote
          xcodegen generate
          xcrun simctl list devices available -j > available-simulators.json
          SIMULATOR_UDID="$(python3 - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('available-simulators.json').read_text())
          for devices in payload.get('devices', {}).values():
              for device in devices:
                  if device.get('isAvailable') and 'iPhone' in device.get('name', ''):
                      print(device['udid'])
                      raise SystemExit(0)
          raise SystemExit('No available iPhone simulator was found.')
          PY
          )"
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          xcodebuild \
            -project MixPilotRemote.xcodeproj \
            -scheme MixPilotRemote \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            CODE_SIGNING_ALLOWED=NO \
            test
          swift test --parallel

      - name: Import Developer ID certificate
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./Scripts/import_signing_certificate.sh

      - name: Build application
        env:
          MIXPILOT_VERSION: ${{ env.RELEASE_VERSION }}
        run: ./Scripts/build_release.sh

      - name: Verify application signature
        run: |
          codesign --verify --deep --strict --verbose=2 "build/MixPilot Autopilot.app"
          codesign -d --verbose=4 "build/MixPilot Autopilot.app" 2>&1 | tee build/codesign-details.txt

      - name: Package DMG
        run: ./Scripts/package_dmg.sh

      - name: Notarize and staple DMG
        if: env.HAS_SIGNING_CERT == 'true' && env.HAS_NOTARIZATION == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./Scripts/notarize_dmg.sh

      - name: Verify checksum
        run: |
          cd build
          shasum -a 256 -c MixPilot-Autopilot.dmg.sha256

      - name: Write release manifest
        run: |
          cat > build/release-manifest.json <<JSON
          {
            "version": "${RELEASE_VERSION}",
            "commit": "${GITHUB_SHA}",
            "signedWithDeveloperID": ${HAS_SIGNING_CERT},
            "notarized": $([[ "${HAS_SIGNING_CERT}" == "true" && "${HAS_NOTARIZATION}" == "true" ]] && echo true || echo false),
            "runner": "${RUNNER_OS}-${RUNNER_ARCH}",
            "validation": {
              "unitTests": "AUTOMATED_SUCCESS",
              "simulation50": "SIMULATED_SUCCESS",
              "simulation250": "SIMULATED_SUCCESS",
              "macOSReleaseBuild": "AUTOMATED_SUCCESS",
              "iphoneSimulatorXCTest": "AUTOMATED_SUCCESS",
              "remoteProtocolContracts": "AUTOMATED_SUCCESS",
              "physicalDJSoftware": "REQUIRES_DEVICE_VALIDATION",
              "deviceAudio": "REQUIRES_DEVICE_VALIDATION",
              "physicalPairing": "REQUIRES_DEVICE_VALIDATION"
            }
          }
          JSON

      - uses: actions/upload-artifact@v4
        with:
          name: MixPilot-Autopilot-${{ env.RELEASE_VERSION }}
          path: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
            build/release-manifest.json
            build/codesign-details.txt

      - name: Report artifact to pull request
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        shell: bash
        run: |
          checksum="$(awk '{print $1}' build/MixPilot-Autopilot.dmg.sha256)"
          signature_label="ad-hoc development signature"
          if [[ "${HAS_SIGNING_CERT}" == "true" ]]; then
            signature_label="Developer ID"
          fi
          notarization_label="not notarized"
          if [[ "${HAS_SIGNING_CERT}" == "true" && "${HAS_NOTARIZATION}" == "true" ]]; then
            notarization_label="notarized and stapled"
          fi
          cat > build/pr-release-report.md <<REPORT
          ## Artifact generated — ${RELEASE_VERSION}

          - Workflow run: ${GITHUB_RUN_ID}
          - Commit: ${GITHUB_SHA}
          - Artifact: MixPilot-Autopilot-${RELEASE_VERSION}
          - DMG SHA-256: ${checksum}
          - Signature: ${signature_label}
          - Notarization: ${notarization_label}
          - Unit tests: AUTOMATED_SUCCESS
          - Simulation 50: SIMULATED_SUCCESS
          - Simulation 250: SIMULATED_SUCCESS
          - macOS release build: AUTOMATED_SUCCESS
          - iPhone Simulator XCTest: AUTOMATED_SUCCESS
          - Physical DJ/audio/pairing: REQUIRES_DEVICE_VALIDATION
          REPORT
          gh pr comment "$PR_NUMBER" --body-file build/pr-release-report.md
          cat build/pr-release-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: |
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
            build/release-manifest.json
          generate_release_notes: true
