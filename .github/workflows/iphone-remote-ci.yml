name: iPhone Remote CI

# Temporarily manual-only while GitHub Actions fails before checkout with
# `steps: none`. Restore pull_request/push triggers after account-level runner
# execution is confirmed. This prevents notification spam without deleting CI.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Source architecture consistency
        run: bash Scripts/check_source_architecture.sh

      - name: Verify shared Remote models
        run: |
          grep -q 'import MixPilotRemoteProtocol' Mobile/MixPilotRemote/Sources/RemoteModels.swift
          if grep -RInE '^(public[[:space:]]+)?(struct|enum)[[:space:]]+(RemoteSnapshot|RemoteCommand|RemoteServerMessage|RemoteClientMessage)' Mobile/MixPilotRemote/Sources; then
            echo 'The iPhone app must use the shared Remote v2 models instead of redefining them.' >&2
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate isolated iOS project
        working-directory: Mobile/MixPilotRemote
        run: xcodegen generate

      - name: Build for iOS Simulator
        working-directory: Mobile/MixPilotRemote
        run: |
          set -o pipefail
          xcodebuild \
            -project MixPilotRemote.xcodeproj \
            -scheme MixPilotRemote \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee iphone-remote-build.log

      - name: Run iOS application tests
        working-directory: Mobile/MixPilotRemote
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl list devices available -j > available-simulators.json
          SIMULATOR_UDID="$(python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('available-simulators.json').read_text())
          for runtime_devices in payload.get('devices', {}).values():
              for device in runtime_devices:
                  if device.get('isAvailable') and 'iPhone' in device.get('name', ''):
                      print(device['udid'])
                      raise SystemExit(0)
          raise SystemExit('No available iPhone simulator was found on the runner.')
          PY
          )"
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          set -o pipefail
          xcodebuild \
            -project MixPilotRemote.xcodeproj \
            -scheme MixPilotRemote \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee iphone-remote-xctest.log

      - name: Run Remote v2 contract and sequence tests
        working-directory: Mobile/MixPilotRemote
        run: |
          set -o pipefail
          swift test --parallel 2>&1 | tee iphone-remote-test.log

      - name: Upload iPhone logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iphone-remote-validation-logs
          path: |
            Mobile/MixPilotRemote/iphone-remote-build.log
            Mobile/MixPilotRemote/iphone-remote-xctest.log
            Mobile/MixPilotRemote/iphone-remote-test.log
            Mobile/MixPilotRemote/available-simulators.json
          if-no-files-found: warn
