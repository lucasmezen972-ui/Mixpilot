name: iPhone Remote CI

on:
  pull_request:
    paths:
      - "Mobile/MixPilotRemote/**"
      - "Shared/RemoteProtocolV2/**"
      - "Scripts/check_source_architecture.sh"
      - ".github/workflows/iphone-remote-ci.yml"
  push:
    branches:
      - develop
      - "feature/**"
      - "integration/**"
      - "release/**"
    paths:
      - "Mobile/MixPilotRemote/**"
      - "Shared/RemoteProtocolV2/**"
      - "Scripts/check_source_architecture.sh"
      - ".github/workflows/iphone-remote-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Source architecture consistency
        run: bash Scripts/check_source_architecture.sh

      - name: Verify shared Remote models
        run: |
          grep -q 'import MixPilotRemoteProtocol' Mobile/MixPilotRemote/Sources/RemoteModels.swift
          if grep -RInE '^(public[[:space:]]+)?(struct|enum)[[:space:]]+(RemoteSnapshot|RemoteCommand|RemoteServerMessage|RemoteClientMessage)' Mobile/MixPilotRemote/Sources; then
            echo 'The iPhone app must use the shared Remote v2 models instead of redefining them.' >&2
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate isolated iOS project
        working-directory: Mobile/MixPilotRemote
        run: xcodegen generate

      - name: Build for iOS Simulator
        working-directory: Mobile/MixPilotRemote
        run: |
          set -o pipefail
          xcodebuild \
            -project MixPilotRemote.xcodeproj \
            -scheme MixPilotRemote \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee iphone-remote-build.log

      - name: Run Remote v2 contract and sequence tests
        working-directory: Mobile/MixPilotRemote
        run: |
          set -o pipefail
          swift test --parallel 2>&1 | tee iphone-remote-test.log

      - name: Upload iPhone logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iphone-remote-validation-logs
          path: |
            Mobile/MixPilotRemote/iphone-remote-build.log
            Mobile/MixPilotRemote/iphone-remote-test.log
          if-no-files-found: warn
