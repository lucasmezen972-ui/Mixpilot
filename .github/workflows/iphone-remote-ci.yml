name: iPhone Remote CI

on:
  pull_request:
    paths:
      - "Mobile/MixPilotRemote/**"
      - "Shared/RemoteProtocolV1/**"
      - ".github/workflows/iphone-remote-ci.yml"
  push:
    branches:
      - develop
      - "integration/**"
      - "release/**"
    paths:
      - "Mobile/MixPilotRemote/**"
      - "Shared/RemoteProtocolV1/**"
      - ".github/workflows/iphone-remote-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate isolated iOS project
        working-directory: Mobile/MixPilotRemote
        run: xcodegen generate

      - name: Build for iOS Simulator
        working-directory: Mobile/MixPilotRemote
        run: |
          set -o pipefail
          xcodebuild \
            -project MixPilotRemote.xcodeproj \
            -scheme MixPilotRemote \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee iphone-remote-build.log

      - name: Select and boot an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          device_id=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get("devices", {}).items():
              for device in devices:
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit("No available iPhone simulator")
          ')
          echo "id=$device_id" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $device_id"
          xcrun simctl boot "$device_id" || true
          xcrun simctl bootstatus "$device_id" -b

      - name: Run protocol contract tests
        working-directory: Mobile/MixPilotRemote
        run: |
          set -o pipefail
          xcodebuild \
            -project MixPilotRemote.xcodeproj \
            -scheme MixPilotRemote \
            -configuration Debug \
            -destination 'id=${{ steps.simulator.outputs.id }}' \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 30 \
            -maximum-test-execution-time-allowance 60 \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee iphone-remote-test.log

      - name: Upload iPhone logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iphone-remote-validation-logs
          path: |
            Mobile/MixPilotRemote/iphone-remote-build.log
            Mobile/MixPilotRemote/iphone-remote-test.log
          if-no-files-found: warn
