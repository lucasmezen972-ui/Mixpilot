name: Explicit cloud identity fix PR

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - consolidation/security-cloud-trust
    paths:
      - .github/explicit-cloud-identity-fix.trigger

permissions:
  contents: write

jobs:
  apply-audit-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout stable consolidation head
        uses: actions/checkout@v4
        with:
          ref: consolidation/security-cloud-trust
          fetch-depth: 0

      - name: Reapply the already validated deterministic candidate
        shell: bash
        run: |
          set -euo pipefail
          python3 Scripts/apply_explicit_cloud_identity_fix.py
          python3 Scripts/apply_final_repository_cleanup.py
          ! grep -R --line-number 'signInAnonymously' \
            Sources/MixPilotSystem/MixPilotCloudService.swift \
            Sources/MixPilotSystem/MixPilotRemoteMappingService.swift
          grep -q 'mixpilot-autopilot' Scripts/build_release.sh
          grep -q 'cloud.handleAuthenticationCallback(url)' Sources/MixPilotApp/MixPilotApp.swift
          grep -q 'SAFETY: The immutable session identifier' Sources/MixPilotApp/SpotifyLibraryCoordinator.swift
          ! grep -q 'Dictionary(uniqueKeysWithValues: plan.commands.map' Sources/MixPilotCore/RekordboxDeviceValidation.swift

      - name: Commit the clean candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'MixPilot Final Fix Bot'
          git config user.email 'actions@users.noreply.github.com'
          git rm \
            Scripts/apply_explicit_cloud_identity_fix.py \
            Scripts/apply_final_repository_cleanup.py \
            .github/workflows/explicit-cloud-identity-fix-pr.yml
          git add -A
          git commit -m 'fix: finalize explicit cloud identity and repository cleanup [skip ci]'

      - name: Verify both audits on the rebased candidate
        shell: bash
        run: |
          set +e
          python3 Scripts/ultimate_repository_audit.py --output-dir ultimate-audit
          ultimate_status=$?
          python3 Scripts/architecture_counter_audit.py --output-dir architecture-counter-audit
          architecture_status=$?
          set -e
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path
          head = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          failed = False
          for path in (
              Path('ultimate-audit/ultimate-audit.json'),
              Path('architecture-counter-audit/architecture-counter-audit.json'),
          ):
              payload = json.loads(path.read_text(encoding='utf-8'))
              summary = payload['summary']
              print(f'{path}: {summary}')
              for finding in payload.get('findings', []):
                  if finding.get('severity') == 'error':
                      print(finding)
              if summary.get('errors') != 0 or summary.get('git_head') != head:
                  failed = True
          if failed:
              raise SystemExit('Rebased candidate audit failed.')
          PY
          if (( ultimate_status != 0 || architecture_status != 0 )); then
            exit 1
          fi

      - name: Confirm branch did not move and push
        shell: bash
        run: |
          set -euo pipefail
          candidate_parent="$(git rev-parse HEAD^)"
          git fetch origin consolidation/security-cloud-trust
          remote_head="$(git rev-parse origin/consolidation/security-cloud-trust)"
          if [[ "$candidate_parent" != "$remote_head" ]]; then
            echo "Consolidation moved from $candidate_parent to $remote_head; refusing stale push." >&2
            exit 1
          fi
          git push origin HEAD:consolidation/security-cloud-trust

      - name: Upload final audit proof
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-final-rebased-audits
          path: |
            ultimate-audit
            architecture-counter-audit
          if-no-files-found: error
