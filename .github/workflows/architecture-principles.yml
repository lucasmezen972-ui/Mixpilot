name: Architecture Principles

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-architecture:
    name: Source architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check source architecture
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Scripts/check_source_architecture.sh
          ./Scripts/check_source_architecture.sh

  remote-mapping-architecture:
    name: Remote mapping architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check Remote mapping architecture
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Scripts/check_remote_mapping_architecture.sh
          ./Scripts/check_remote_mapping_architecture.sh

  runtime-safety:
    name: Runtime safety
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check runtime safety
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Scripts/check_runtime_safety.sh
          ./Scripts/check_runtime_safety.sh

  transport-reliability:
    name: Remote transport reliability
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check transport reliability and P0 containment
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Scripts/check_transport_reliability.sh
          ./Scripts/check_transport_reliability.sh

  terminology-documentation:
    name: Terminology, documentation and supply chain
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check terminology and documentation
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Scripts/check_documentation_consistency.sh
          ./Scripts/check_documentation_consistency.sh
      - name: Check immutable CI dependencies
        run: python3 Scripts/check_ci_pinning.py

  runner-availability-macos:
    name: Runner availability (macOS)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify hosted macOS runner
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          uname -a
          xcodebuild -version
          swift --version
          df -h
