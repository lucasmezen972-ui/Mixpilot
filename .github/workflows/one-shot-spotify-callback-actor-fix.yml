name: One-shot Spotify callback actor fix

on:
  push:
    branches:
      - consolidation/security-cloud-trust
    paths:
      - .github/workflows/one-shot-spotify-callback-actor-fix.yml

permissions:
  contents: write

jobs:
  patch-test-package:
    runs-on: macos-latest
    timeout-minutes: 75
    steps:
      - name: Checkout consolidation branch
        uses: actions/checkout@v4
        with:
          ref: consolidation/security-cloud-trust
          fetch-depth: 0

      - name: Patch AuthenticationServices callback actor crash
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Sources/MixPilotApp/SpotifyLibraryCoordinator.swift")
          source = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              source = source.replace(old, new, 1)

          replace_once(
              '''    private var webAuthenticationSession: ASWebAuthenticationSession?
              private var webAuthenticationPresentationContext: SpotifyAuthenticationPresentationContext?
              private var refreshTask: Task<SpotifyStoredSession, Error>?
          ''',
              '''    private var webAuthenticationSession: ASWebAuthenticationSession?
              private var webAuthenticationPresentationContext: SpotifyAuthenticationPresentationContext?
              private var webAuthenticationCallbackRelay: SpotifyAuthenticationCallbackRelay?
              private var webAuthenticationSessionID: UUID?
              private var refreshTask: Task<SpotifyStoredSession, Error>?
          ''',
              "authentication session storage",
          )

          replace_once(
              '''            let session = ASWebAuthenticationSession(
                  url: authorizationURL,
                  callbackURLScheme: Self.callbackURL.scheme
              ) { [weak self] callbackURL, error in
                  Task { @MainActor [weak self] in
                      guard let self else { return }
                      self.webAuthenticationSession = nil
                      self.webAuthenticationPresentationContext = nil

                      if error != nil {
                          self.clearPendingAuthorization()
                          self.present(SpotifyBridgeError.authorizationCancelled)
                          return
                      }
                      guard let callbackURL else {
                          self.clearPendingAuthorization()
                          self.present(SpotifyBridgeError.invalidCallback)
                          return
                      }
                      await self.completeAuthorization(callbackURL)
                  }
              }
          ''',
              '''            let sessionID = UUID()
              let callbackRelay = SpotifyAuthenticationCallbackRelay(
                  sessionID: sessionID,
                  coordinator: self
              )
              let session = SpotifyWebAuthenticationSessionFactory.makeSession(
                  url: authorizationURL,
                  callbackURLScheme: Self.callbackURL.scheme,
                  relay: callbackRelay
              )
          ''',
              "main-actor authentication callback",
          )

          replace_once(
              '''            webAuthenticationPresentationContext = presentationContext
              webAuthenticationSession = session

              guard session.start() else {
          ''',
              '''            webAuthenticationPresentationContext = presentationContext
              webAuthenticationCallbackRelay = callbackRelay
              webAuthenticationSessionID = sessionID
              webAuthenticationSession = session

              guard session.start() else {
          ''',
              "authentication session retention",
          )

          replace_once(
              '''    func disconnect() {
          ''',
              '''    fileprivate func handleAuthenticationCallback(
                  _ result: SpotifyAuthenticationCallbackResult,
                  sessionID: UUID
              ) async {
                  guard webAuthenticationSessionID == sessionID else { return }

                  webAuthenticationSession = nil
                  webAuthenticationPresentationContext = nil
                  webAuthenticationCallbackRelay = nil
                  webAuthenticationSessionID = nil

                  switch result {
                  case let .success(callbackURL):
                      await completeAuthorization(callbackURL)
                  case .cancelled:
                      clearPendingAuthorization()
                      present(SpotifyBridgeError.authorizationCancelled)
                  case .invalidCallback:
                      clearPendingAuthorization()
                      present(SpotifyBridgeError.invalidCallback)
                  }
              }

              func disconnect() {
          ''',
              "main-actor callback receiver",
          )

          replace_once(
              '''    private func cancelAuthorizationSession() {
                  webAuthenticationSession?.cancel()
                  webAuthenticationSession = nil
                  webAuthenticationPresentationContext = nil
              }
          ''',
              '''    private func cancelAuthorizationSession() {
                  webAuthenticationSession?.cancel()
                  webAuthenticationSession = nil
                  webAuthenticationPresentationContext = nil
                  webAuthenticationCallbackRelay = nil
                  webAuthenticationSessionID = nil
              }
          ''',
              "authorization cancellation cleanup",
          )

          replace_once(
              '''// SAFETY: The presentation anchor is captured once on the MainActor, remains
          ''',
              '''fileprivate enum SpotifyAuthenticationCallbackResult: Sendable {
              case success(URL)
              case cancelled
              case invalidCallback
          }

          // The AuthenticationServices completion can be invoked from a non-main executor.
          // This relay is deliberately created outside the coordinator's callback closure and
          // performs the only actor hop before touching MainActor-isolated state.
          private final class SpotifyAuthenticationCallbackRelay: @unchecked Sendable {
              private let sessionID: UUID
              private weak var coordinator: SpotifyLibraryCoordinator?

              init(sessionID: UUID, coordinator: SpotifyLibraryCoordinator) {
                  self.sessionID = sessionID
                  self.coordinator = coordinator
              }

              func receive(callbackURL: URL?, error: Error?) {
                  let result: SpotifyAuthenticationCallbackResult
                  if error != nil {
                      result = .cancelled
                  } else if let callbackURL {
                      result = .success(callbackURL)
                  } else {
                      result = .invalidCallback
                  }

                  let sessionID = sessionID
                  let coordinator = coordinator
                  Task { @MainActor [weak coordinator] in
                      await coordinator?.handleAuthenticationCallback(
                          result,
                          sessionID: sessionID
                      )
                  }
              }
          }

          // The closure passed to AuthenticationServices is lexically created in this
          // non-actor-isolated factory, so it cannot inherit SpotifyLibraryCoordinator's
          // MainActor isolation and trip Swift's runtime executor precondition.
          private enum SpotifyWebAuthenticationSessionFactory {
              static func makeSession(
                  url: URL,
                  callbackURLScheme: String?,
                  relay: SpotifyAuthenticationCallbackRelay
              ) -> ASWebAuthenticationSession {
                  ASWebAuthenticationSession(
                      url: url,
                      callbackURLScheme: callbackURLScheme
                  ) { [relay] callbackURL, error in
                      relay.receive(callbackURL: callbackURL, error: error)
                  }
              }
          }

          // SAFETY: The presentation anchor is captured once on the MainActor, remains
          ''',
              "actor-neutral callback relay",
          )

          path.write_text(source, encoding="utf-8")

          required = [
              "SpotifyWebAuthenticationSessionFactory.makeSession(",
              "private final class SpotifyAuthenticationCallbackRelay",
              "Task { @MainActor [weak coordinator] in",
              "guard webAuthenticationSessionID == sessionID else { return }",
              "relay.receive(callbackURL: callbackURL, error: error)",
          ]
          for needle in required:
              if needle not in source:
                  raise SystemExit(f"missing patched contract: {needle}")
          forbidden = [
              ") { [weak self] callbackURL, error in",
              "Task { @MainActor [weak self] in",
          ]
          for needle in forbidden:
              if needle in source:
                  raise SystemExit(f"unsafe callback pattern remains: {needle}")
          PY

      - name: Add callback actor regression contracts
        shell: bash
        run: |
          set -euo pipefail
          cat > Tests/MixPilotSystemTests/SpotifyAuthenticationPresentationTests.swift <<'SWIFT'
          #if os(macOS)
          import Foundation
          import XCTest

          final class SpotifyAuthenticationPresentationTests: XCTestCase {
              func testPresentationContextAvoidsRuntimeActorAssumptions() throws {
                  let source = try repositoryFile(
                      "Sources/MixPilotApp/SpotifyLibraryCoordinator.swift"
                  )

                  XCTAssertTrue(source.contains(
                      "@preconcurrency import AuthenticationServices"
                  ))
                  XCTAssertTrue(source.contains(
                      "private final class SpotifyAuthenticationPresentationContext"
                  ))
                  XCTAssertTrue(source.contains(
                      "private var webAuthenticationPresentationContext: SpotifyAuthenticationPresentationContext?"
                  ))
                  XCTAssertTrue(source.contains(
                      "session.presentationContextProvider = presentationContext"
                  ))
                  XCTAssertTrue(source.contains(
                      "webAuthenticationPresentationContext = presentationContext"
                  ))
                  XCTAssertTrue(source.contains("NSApp.keyWindow"))
                  XCTAssertTrue(source.contains("NSApp.mainWindow"))
                  XCTAssertTrue(source.contains(
                      "nonisolated(unsafe) private let anchor: ASPresentationAnchor"
                  ))
                  XCTAssertTrue(source.contains(
                      "nonisolated func presentationAnchor("
                  ))
                  XCTAssertTrue(source.contains(
                      "SAFETY: The presentation anchor is captured once on the MainActor"
                  ))
                  XCTAssertFalse(source.contains("MainActor.assumeIsolated"))
                  XCTAssertFalse(source.contains("DispatchQueue.main.sync"))
                  XCTAssertFalse(source.contains(
                      "extension SpotifyLibraryCoordinator: ASWebAuthenticationPresentationContextProviding"
                  ))
              }

              func testAuthenticationCallbackIsCreatedOutsideTheMainActor() throws {
                  let source = try repositoryFile(
                      "Sources/MixPilotApp/SpotifyLibraryCoordinator.swift"
                  )

                  XCTAssertTrue(source.contains(
                      "private enum SpotifyWebAuthenticationSessionFactory"
                  ))
                  XCTAssertTrue(source.contains(
                      "private final class SpotifyAuthenticationCallbackRelay"
                  ))
                  XCTAssertTrue(source.contains(
                      "SpotifyWebAuthenticationSessionFactory.makeSession("
                  ))
                  XCTAssertTrue(source.contains(
                      "relay.receive(callbackURL: callbackURL, error: error)"
                  ))
                  XCTAssertTrue(source.contains(
                      "Task { @MainActor [weak coordinator] in"
                  ))
                  XCTAssertTrue(source.contains(
                      "guard webAuthenticationSessionID == sessionID else { return }"
                  ))
                  XCTAssertFalse(source.contains(
                      ") { [weak self] callbackURL, error in"
                  ))
                  XCTAssertFalse(source.contains(
                      "Task { @MainActor [weak self] in"
                  ))
              }

              func testOAuthCallbackParsingRejectsDuplicateParametersWithoutDictionaryTrap() throws {
                  let source = try repositoryFile(
                      "Sources/MixPilotApp/SpotifyLibraryCoordinator.swift"
                  )

                  XCTAssertTrue(source.contains("struct SpotifyAuthorizationCallback"))
                  XCTAssertTrue(source.contains("guard values[item.name] == nil"))
                  XCTAssertTrue(source.contains("clearPendingAuthorization()"))
                  XCTAssertFalse(source.contains("Dictionary(uniqueKeysWithValues:"))
                  XCTAssertFalse(source.contains("URL(string: \"mixpilot-spotify://callback\")!"))
              }

              func testReleaseBundleRegistersSpotifyCallbackScheme() throws {
                  let script = try repositoryFile("Scripts/build_release.sh")

                  XCTAssertTrue(script.contains("CFBundleURLTypes"))
                  XCTAssertTrue(script.contains("CFBundleURLSchemes"))
                  XCTAssertTrue(script.contains("mixpilot-spotify"))
                  XCTAssertTrue(script.contains("plutil -lint"))
                  XCTAssertTrue(script.contains("PlistBuddy"))
              }

              func testReleaseRequiresBothIndependentAudits() throws {
                  let buildScript = try repositoryFile("Scripts/build_release.sh")
                  let packageScript = try repositoryFile("Scripts/package_dmg.sh")

                  for script in [buildScript, packageScript] {
                      XCTAssertTrue(script.contains("ultimate_repository_audit.py"))
                      XCTAssertTrue(script.contains("architecture_counter_audit.py"))
                      XCTAssertTrue(script.contains("git_head"))
                  }
              }

              private func repositoryFile(_ relativePath: String) throws -> String {
                  let root = URL(fileURLWithPath: #filePath)
                      .deletingLastPathComponent()
                      .deletingLastPathComponent()
                      .deletingLastPathComponent()
                  return try String(
                      contentsOf: root.appendingPathComponent(relativePath),
                      encoding: .utf8
                  )
              }
          }
          #endif
          SWIFT

      - name: Verify focused source contract
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'SpotifyWebAuthenticationSessionFactory.makeSession(' Sources/MixPilotApp/SpotifyLibraryCoordinator.swift
          grep -q 'private final class SpotifyAuthenticationCallbackRelay' Sources/MixPilotApp/SpotifyLibraryCoordinator.swift
          grep -q 'Task { @MainActor \[weak coordinator\] in' Sources/MixPilotApp/SpotifyLibraryCoordinator.swift
          grep -q 'guard webAuthenticationSessionID == sessionID else { return }' Sources/MixPilotApp/SpotifyLibraryCoordinator.swift
          ! grep -q ') { \[weak self\] callbackURL, error in' Sources/MixPilotApp/SpotifyLibraryCoordinator.swift

      - name: Run Swift tests
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          swift test --parallel 2>&1 | tee spotify-callback-actor-fix-test.log

      - name: Build macOS release product
        shell: bash
        run: |
          set -euo pipefail
          swift build -c release --product MixPilotAutopilot

      - name: Build corrected app and DMG
        shell: bash
        env:
          MIXPILOT_VERSION: 0.4.2-spotify-callback-actor-fix
          CODE_SIGN_IDENTITY: '-'
        run: |
          set -euo pipefail
          chmod +x Scripts/*.sh
          ./Scripts/build_release.sh
          ./Scripts/package_dmg.sh
          codesign --verify --deep --strict --verbose=2 "build/MixPilot Autopilot.app"
          cd build
          shasum -a 256 -c MixPilot-Autopilot.dmg.sha256

      - name: Commit validated source fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'MixPilot Callback Fix Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            Sources/MixPilotApp/SpotifyLibraryCoordinator.swift \
            Tests/MixPilotSystemTests/SpotifyAuthenticationPresentationTests.swift
          git commit -m 'fix: isolate Spotify auth callback from MainActor [skip ci]'
          git push origin HEAD:consolidation/security-cloud-trust

      - name: Upload corrected DMG
        uses: actions/upload-artifact@v4
        with:
          name: MixPilot-0.4.2-spotify-callback-actor-fix
          path: |
            spotify-callback-actor-fix-test.log
            build/MixPilot-Autopilot.dmg
            build/MixPilot-Autopilot.dmg.sha256
          if-no-files-found: error
